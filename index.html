<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P-Mentor M&B</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    background:#121212;
    color:#00ff88;
    font-family: monospace;
    margin:10px;
}

input {
    width:80px;
    background:#222;
    color:white;
    border:1px solid #555;
    font-size:18px;
    margin:4px;
}

button {
    width:100%;
    padding:12px;
    margin-top:8px;
    background:#333;
    color:white;
    font-size:18px;
}

canvas {
    width:100%;
    height:300px;
    background:black;
    margin-top:10px;
}
</style>
</head>

<body>

<h2>P-Mentor M&B</h2>

<b>Aircraft</b><br>
BEM <input id="bem" value="456">
Moment <input id="bemo" value="788.5"><br>
Density <input id="density" value="0.72"><br><br>

<b>Payload</b><br>
Pilot <input id="pilot" value="90">
Pax <input id="pax" value="95">
Bag <input id="bag" value="10"><br><br>

<b>Fuel</b><br>
Fuel L <input id="fuel_l">
kg <input id="fuel_kg"><br>
Taxi L <input id="taxi_l">
kg <input id="taxi_kg"><br>
Trip L <input id="trip_l">
kg <input id="trip_kg"><br>

<pre id="output"></pre>

<button onclick="window.print()">Export (Print PDF)</button>
<button onclick="clearAll()">Clear Fields</button>

<canvas id="graph"></canvas>

<script src="app.js"></script>

</body>
</html>
